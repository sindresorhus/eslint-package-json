name: Rule change
description: A rule could be improved or extended?
title: "`rule-name`: "
labels:
  - change request
  - evaluating
body:
  - type: markdown
    attributes:
      value: |
        Before opening a new issue:
        - Look for existing [open or closed rule proposals](https://github.com/sindresorhus/eslint-package-json/issues?q=is:issue+label%25enhancement)
        - [Report a bug](https://github.com/sindresorhus/eslint-package-json/issues/new?assignees=&labels=&projects=&template=bug_report.md) instead if it's a false positive
  - type: textarea
    validations:
      required: true
    attributes:
      label: Description
      description: Explain the improvement you would like to see.
  - type: textarea
    validations:
      required: true
    attributes:
      label: Examples
      description: Provide examples of `package.json` to detect and the acceptable alternatives.
      value: |
        ```json
        // ❌
        {
        	"name": "Foo"
        }
        ```

        ```json
        // ✅
        {
        	"name": "foo"
        }
        ```
  - type: textarea
    attributes:
      label: Additional Info
